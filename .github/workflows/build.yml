name: Build Executables

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            separator: ":"
            binary_name: SFDCJobManager
          - os: windows-latest
            separator: ";"
            binary_name: SFDCJobManager.exe
          - os: macos-latest
            separator: ":"
            binary_name: SFDCJobManager

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller uvicorn fastapi pydantic

    - name: Build with PyInstaller
      run: |
        pyinstaller --name "SFDCJobManager" --add-data "static${{ matrix.separator }}static" --clean -y --onefile main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v5
      with:
        name: SFDCJobManager-${{ matrix.os }}
        path: dist/${{ matrix.binary_name }}
